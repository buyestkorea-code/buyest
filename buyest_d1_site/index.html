<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>재고 조회</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 720px; margin: 40px auto; padding: 0 16px; }
    input, button { font-size: 16px; padding: 10px; }
    input { width: 260px; }
    button { cursor: pointer; }
    .row { display: flex; gap: 8px; flex-wrap: wrap; }
    .box { border: 1px solid #ddd; border-radius: 8px; padding: 16px; margin-top: 16px; }
    table { width: 100%; border-collapse: collapse; margin-top: 12px; }
    th, td { border-bottom: 1px solid #eee; text-align: left; padding: 8px; }
    .muted { color: #666; }
  </style>
</head>
<body>
  <h2>바코드 조회</h2>
  <div class="row">
    <input id="barcode" placeholder="바코드 입력" />
    <button onclick="searchStock()">조회</button>
  </div>

  <div id="result" class="box muted">대기 중</div>

  <script>
    async function searchStock() {
      const box = document.getElementById("result");
      const barcode = document.getElementById("barcode").value.trim();

      if (!barcode) {
        box.textContent = "바코드를 입력하세요.";
        return;
      }

      box.textContent = "조회 중...";

      try {
        const res = await fetch(`/api/search?barcode=${encodeURIComponent(barcode)}`);
        const data = await res.json();

        if (!res.ok) {
          box.textContent = data.error || "조회 실패";
          return;
        }

        const rows = (data.items || []).map(item => {
          return `<tr><td>${escapeHtml(item.size)}</td><td>${Number(item.stock_qty || 0)}장</td></tr>`;
        }).join("");

        box.innerHTML = `
          <div><strong>브랜드:</strong> ${escapeHtml(data.brand || "")}</div>
          <div><strong>묶음코드:</strong> ${escapeHtml(data.group_code || "")}</div>
          <div><strong>스캔한 사이즈:</strong> ${escapeHtml(data.scanned_size || "")}</div>
          <table>
            <thead>
              <tr><th>사이즈</th><th>재고</th></tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>
        `;
      } catch (e) {
        box.textContent = "조회 실패: " + (e?.message || String(e));
      }
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }
  </script>
</body>
</html>
