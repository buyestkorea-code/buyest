<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>관리자 업로드</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 760px; margin: 40px auto; padding: 0 16px; }
    input, button { font-size: 16px; padding: 10px; }
    button { cursor: pointer; }
    .box { border: 1px solid #ddd; border-radius: 8px; padding: 16px; margin-top: 16px; }
    .muted { color: #666; }
    progress { width: 100%; height: 20px; margin-top: 12px; }
  </style>
</head>
<body>
  <h2>CSV 업로드</h2>
  <p class="muted">D1 기준 업로드. 16,000행도 여러 청크로 나눠서 업로드합니다.</p>

  <div>
    <input type="password" id="pw" placeholder="비밀번호" />
  </div>
  <br />
  <div>
    <input type="file" id="file" accept=".csv,text/csv" />
  </div>
  <br />
  <button id="uploadBtn" onclick="uploadCsv()">업로드</button>

  <div class="box">
    <div id="status">대기 중</div>
    <progress id="prog" value="0" max="100"></progress>
    <pre id="log" style="white-space: pre-wrap;"></pre>
  </div>

  <script>
    const CHUNK_SIZE = 300;

    async function uploadCsv() {
      const pw = document.getElementById("pw").value.trim();
      const file = document.getElementById("file").files[0];
      const status = document.getElementById("status");
      const log = document.getElementById("log");
      const btn = document.getElementById("uploadBtn");
      const prog = document.getElementById("prog");

      if (!pw) {
        status.textContent = "비밀번호를 입력하세요.";
        return;
      }
      if (!file) {
        status.textContent = "CSV 파일을 선택하세요.";
        return;
      }

      btn.disabled = true;
      prog.value = 0;
      log.textContent = "";
      status.textContent = "파일 읽는 중...";

      try {
        const rows = await parseCsvFile(file);
        if (!rows.length) {
          status.textContent = "업로드할 데이터가 없습니다.";
          return;
        }

        status.textContent = `총 ${rows.length}행 업로드 시작`;
        let uploaded = 0;

        for (let i = 0; i < rows.length; i += CHUNK_SIZE) {
          const chunk = rows.slice(i, i + CHUNK_SIZE);

          const res = await fetch("/api/upload-chunk", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "x-password": pw
            },
            body: JSON.stringify({
              replace: i === 0,
              rows: chunk
            })
          });

          const data = await res.json();
          if (!res.ok) {
            throw new Error(data.error || "청크 업로드 실패");
          }

          uploaded += chunk.length;
          prog.value = Math.round((uploaded / rows.length) * 100);
          status.textContent = `업로드 중... ${uploaded} / ${rows.length}`;
          log.textContent = `현재 청크 저장: ${data.saved}\n마지막 메시지: ${data.message || "정상"}`;
        }

        status.textContent = `업로드 완료 (${rows.length}행)`;
        log.textContent += "\n\n전체 업로드 완료";
      } catch (e) {
        status.textContent = "업로드 실패";
        log.textContent = e?.message || String(e);
      } finally {
        btn.disabled = false;
      }
    }

    async function parseCsvFile(file) {
      const buffer = await file.arrayBuffer();
      const bytes = new Uint8Array(buffer);

      let text = "";
      try {
        text = new TextDecoder("utf-8").decode(bytes);
      } catch (_) {}

      if (!looksHeader(text)) {
        try {
          text = new TextDecoder("euc-kr").decode(bytes);
        } catch (_) {}
      }

      const lines = text
        .replace(/^\uFEFF/, "")
        .split(/\r?\n/)
        .map(v => v.trim())
        .filter(Boolean);

      function parseCsvLine(line) {
        const result = [];
        let current = "";
        let inQuotes = false;

        for (let i = 0; i < line.length; i++) {
          const ch = line[i];
          const next = line[i + 1];

          if (ch === '"') {
            if (inQuotes && next === '"') {
              current += '"';
              i++;
            } else {
              inQuotes = !inQuotes;
            }
          } else if (ch === "," && !inQuotes) {
            result.push(current.trim());
            current = "";
          } else {
            current += ch;
          }
        }

        result.push(current.trim());
        return result;
      }

      let headerIndex = -1;
      let headerCols = [];

      for (let i = 0; i < Math.min(lines.length, 10); i++) {
        const cols = parseCsvLine(lines[i]);
        if (
          cols.includes("분류명") &&
          cols.includes("품목명") &&
          cols.includes("바코드") &&
          cols.includes("재고량")
        ) {
          headerIndex = i;
          headerCols = cols;
          break;
        }
      }

      if (headerIndex === -1) {
        throw new Error("헤더를 찾지 못했습니다. CSV 형식을 확인하세요.");
      }

      const idxBrand = headerCols.indexOf("분류명");
      const idxName = headerCols.indexOf("품목명");
      const idxBarcode = headerCols.indexOf("바코드");
      const idxStock = headerCols.indexOf("재고량");

      const out = [];

      for (let i = headerIndex + 1; i < lines.length; i++) {
        const cols = parseCsvLine(lines[i]);
        const brand = (cols[idxBrand] || "").trim();
        const name = (cols[idxName] || "").trim();
        const barcode = (cols[idxBarcode] || "").trim();
        const stockRaw = (cols[idxStock] || "").trim();

        if (!barcode || !name) continue;

        const parsed = parseName(name);
        if (!parsed) continue;

        out.push({
          barcode,
          brand,
          group_code: parsed.group,
          size: parsed.size,
          stock_qty: Number(String(stockRaw).replace(/[^0-9\-]/g, "")) || 0
        });
      }

      return out;
    }

    function parseName(nameRaw) {
      const name = String(nameRaw || "").trim();
      if (!name) return null;

      const parts = name.split("_").map(v => v.trim()).filter(Boolean);

      if (parts.length >= 3) {
        return {
          group: parts[parts.length - 2],
          size: parts[parts.length - 1]
        };
      }
      if (parts.length === 2) {
        return {
          group: parts[0],
          size: parts[1]
        };
      }
      return null;
    }

    function looksHeader(text) {
      return text.includes("분류명") &&
             text.includes("품목명") &&
             text.includes("바코드") &&
             text.includes("재고량");
    }
  </script>
</body>
</html>
