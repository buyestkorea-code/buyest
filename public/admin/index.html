<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>재고 업로드 관리자</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="app-shell">
    <header class="hero">
      <p class="eyebrow">ADMIN</p>
      <h1>재고 엑셀 업로드</h1>
      <p class="hero-desc">엑셀 파일을 올리면 서버에 자동 저장되고 고객 페이지에 바로 반영됩니다.</p>
    </header>

    <main class="content">
      <section class="card">
        <label class="label" for="adminPassword">관리자 비밀번호</label>
        <input id="adminPassword" type="password" placeholder="비밀번호 입력" />

        <label class="label" for="excelFile" style="margin-top:14px;">엑셀 파일 선택 (.xls / .xlsx)</label>
        <input id="excelFile" type="file" accept=".xls,.xlsx" />
        <p class="hint">필수 컬럼: 분류명, 품목명, 바코드, 재고량</p>

        <button id="uploadBtn" class="btn btn-primary" style="margin-top:14px;">엑셀 업로드 후 저장</button>
      </section>

      <section class="card">
        <div class="status-row"><span>상태</span><strong id="statusText">대기 중</strong></div>
        <div class="status-row"><span>미리보기 건수</span><strong id="rowCount">0건</strong></div>
      </section>

      <section class="card">
        <h3 class="section-title">미리보기</h3>
        <pre id="preview"></pre>
      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  <script src="/admin/admin.js"></script>
</body>
</html>
