<script>
async function upload() {
  const log = document.getElementById("log");
  const btn = document.getElementById("uploadBtn");
  const file = document.getElementById("file").files[0];
  const pw = document.getElementById("pw").value;

  try {
    if (!pw) {
      log.textContent = "비밀번호를 입력하세요.";
      return;
    }

    if (!file) {
      log.textContent = "CSV 파일을 선택하세요.";
      return;
    }

    btn.disabled = true;
    log.textContent = "업로드 중...";

    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 60000);

    const form = new FormData();
    form.append("file", file);

    const res = await fetch("/api/upload", {
      method: "POST",
      headers: { "x-password": pw },
      body: form,
      signal: controller.signal
    });

    clearTimeout(timeout);

    const text = await res.text();
    log.textContent = `HTTP 상태: ${res.status}\n\n${text}`;
  } catch (err) {
    if (err.name === "AbortError") {
      log.textContent = "업로드 시간이 너무 오래 걸립니다. 파일이 크거나 저장 건수가 많습니다.";
    } else {
      log.textContent = "업로드 실패:\n" + (err.message || String(err));
    }
  } finally {
    btn.disabled = false;
  }
}
</script>
